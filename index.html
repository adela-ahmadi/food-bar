<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>FoodBar</title>
  </head>
  <body>
    <!-- Top Bar -->
    <div
      class="container-fluid text-white py-3 px-4 d-none d-lg-block"
      style="border-radius: 0 0 20px 20px"
      id="top-header">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center small">
          <span class="me-3">
            <i class="fas fa-map-marker-alt text-warning me-2"></i>12A Street,
            Herat
          </span>
          <span>
            <i class="fas fa-envelope text-warning me-2"></i>adela@example.com
          </span>
        </div>

        <div class="d-flex align-items-center small">
          <a href="#" class="text-white text-decoration-none hover-link"
            >Privacy Policy</a
          >
          <span class="mx-2 text-white-50">/</span>
          <a href="#" class="text-white text-decoration-none hover-link"
            >Terms of Use</a
          >
          <span class="mx-2 text-white-50">/</span>
          <a href="#" class="text-white text-decoration-none hover-link"
            >Sales and Refunds</a
          >
        </div>
      </div>
    </div>
    <!-- Navbar -->
    <nav class="navbar sticky-top navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid g-0 px-4 px-lg-5">
        <a class="navbar-brand" href="#">FoodBar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Shop</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
                Pages
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Cart</a></li>
                <li><a class="dropdown-item" href="#">Checkout</a></li>
                <li><a class="dropdown-item" href="#">Testimonial</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="#">404 Page</a>
                </li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link">Contact</a>
            </li>
          </ul>
          <!-- Icons-->
          <div class="d-flex align-items-center gap-3">
            <!-- search button -->
            <button
              type="button"
              class="btn-search btn border border-secondary btn-md-square rounded-circle"
              data-bs-toggle="modal"
              data-bs-target="#searchModal">
              <i class="fas fa-search"></i>
            </button>

            <!-- shop icon -->
            <a
              href="#"
              class="position-relative text-decoration-none btn-cart-user">
              <i class="fa-solid fa-bag-shopping fa-2x"></i>
              <span
                class="position-absolute bg-warning text-dark rounded-circle d-flex align-items-center justify-content-center text-white px-1"
                style="
                  top: -5px;
                  left: 15px;
                  height: 20px;
                  min-width: 20px;
                  font-size: 12px;
                  background-color: #676363 !important;
                "
                >3</span
              >
            </a>

            <!--  user icon -->
            <a href="#" class="text-decoration-none btn-cart-user">
              <i class="fa-solid fa-user fa-2x"></i>
            </a>
          </div>

          <!-- search modal -->
          <div
            class="modal fade"
            id="searchModal"
            tabindex="-1"
            aria-labelledby="exampleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-fullscreen">
              <div
                class="modal-content rounded-0"
                style="background: rgba(255, 255, 255, 0.95)">
                <div class="modal-header border-0">
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-toggle="modal"
                    data-bs-target="#searchModal"
                    aria-label="Close"></button>
                </div>
                <div
                  class="modal-body d-flex align-items-center justify-content-center">
                  <div
                    class="input-group w-75 mx-auto d-flex"
                    style="max-width: 600px">
                    <input
                      type="search"
                      class="form-control p-3 border-secondary"
                      placeholder="Search keywords..."
                      aria-describedby="search-icon-1" />
                    <span
                      id="search-icon-1"
                      class="input-group-text p-3 border-secondary"
                      style="
                        background-color: #ff8f00;
                        color: white;
                        cursor: pointer;
                      ">
                      <i class="fa fa-search"></i>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section position-relative py-5">
      <div
        class="hero-bg-overlay position-absolute top-0 start-0 w-100 h-100"></div>

      <div class="container position-relative z-3 py-5">
        <div class="row align-items-center g-5">
          <div class="col-lg-7 text-start">
            <h4 class="text-warning fw-bold mb-3">100% Organic Foods</h4>
            <h1
              class="display-3 fw-bold hero-text mb-4"
              style="line-height: 1.2">
              Organic Veggies & <br />
              Fruits Foods
            </h1>

            <!-- Search Form-->
            <div class="position-relative w-75" style="max-width: 500px">
              <input
                type="text"
                class="form-control border-warning p-3 rounded-pill w-100"
                placeholder="Search" />
              <button
                class="btn btn-search position-absolute top-0 end-0 h-100 rounded-pill px-4"
                type="button">
                Submit Now
              </button>
            </div>
          </div>

          <!-- (Carousel) -->
          <div class="col-lg-5">
            <div
              id="heroCarousel"
              class="carousel slide"
              data-bs-ride="carousel">
              <div class="carousel-inner rounded-4 shadow-lg">
                <!-- First Slide-->
                <div class="carousel-item active position-relative">
                  <img
                    src="image/pizza.jpg"
                    class="d-block w-100"
                    alt="Pizza"
                    style="height: 400px; object-fit: cover" />
                  <div
                    class="position-absolute top-50 start-50 translate-middle bg-warning px-4 py-2 rounded-3 text-white fw-bold">
                    Pizza
                  </div>
                </div>

                <!-- Second Slide-->
                <div class="carousel-item position-relative">
                  <img
                    src="image/burger.jpg"
                    class="d-block w-100"
                    alt="burger"
                    style="height: 400px; object-fit: cover" />
                  <div
                    class="position-absolute top-50 start-50 translate-middle bg-warning px-4 py-2 rounded-3 text-white fw-bold">
                    Burger
                  </div>
                </div>

                <!-- Third Slide -->
                <div class="carousel-item position-relative">
                  <img
                    src="image/fillet.jpg"
                    class="d-block w-100"
                    alt="fillet"
                    style="height: 400px; object-fit: cover" />
                  <div
                    class="position-absolute top-50 start-50 translate-middle bg-warning px-4 py-2 rounded-3 text-white fw-bold">
                    Fillet
                  </div>
                </div>
              </div>

              <!-- Slider Buttons -->
              <button
                class="carousel-control-prev"
                type="button"
                data-bs-target="#heroCarousel"
                data-bs-slide="prev">
                <span
                  class="carousel-control-prev-icon bg-warning rounded-circle p-3"
                  aria-hidden="true"></span>
              </button>
              <button
                class="carousel-control-next"
                type="button"
                data-bs-target="#heroCarousel"
                data-bs-slide="next">
                <span
                  class="carousel-control-next-icon bg-warning rounded-circle p-3"
                  aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
